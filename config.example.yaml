paths:
  data_dir: data
  outputs_dir: outputs

colmap:
  camera_model: SIMPLE_RADIAL
  matcher: exhaustive
  use_gpu: true
  gpu_index: 0
  max_image_size: 2000
  sift_max_num_features: 8192
  sequential_overlap: 10
  mapper_min_num_matches: 15

ablation:
  subset_sizes: [6, 10, 15, 20, 30]
  runs_per_size: 3

graph:
  min_inliers: 15
  min_inlier_ratio: 0.15

doppelgangers:
  matcher: exhaustive
  min_visual_matches: 80
  max_inlier_ratio: 0.85
  top_k: 15

report:
  include_success_plot: true
