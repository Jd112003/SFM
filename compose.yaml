x-sfm-common: &sfm-common
  build:
    context: .
    dockerfile: Dockerfile
  image: sfm-object-pipeline:latest
  working_dir: /workspace
  entrypoint: ["python", "-m", "sfm_pipeline"]
  command: ["--help"]
  user: "${SFM_UID:-1000}:${SFM_GID:-1000}"
  volumes:
    - .:/workspace
  environment:
    PYTHONUNBUFFERED: "1"
  init: true

x-colmap-common: &colmap-common
  image: colmap/colmap:latest
  working_dir: /workspace
  entrypoint: ["colmap"]
  command: ["help"]
  user: "${SFM_UID:-1000}:${SFM_GID:-1000}"
  volumes:
    - .:/workspace
  init: true

services:
  sfm:
    <<: *sfm-common

  sfm-gpu:
    <<: *sfm-common
    environment:
      PYTHONUNBUFFERED: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    gpus: all

  colmap:
    <<: *colmap-common

  colmap-gpu:
    <<: *colmap-common
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    gpus: all

  viewer:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sfm-viewer:latest
    ports:
      - "3010:3000"
    environment:
      SFM_OUTPUTS_ROOT: /workspace-data/outputs
    volumes:
      - .:/workspace-data:ro
    init: true
